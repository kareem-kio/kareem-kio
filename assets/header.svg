<svg fill="none" viewBox="0 0 1000 200" width="1000" height="200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000">
        <animate attributeName="stop-color"
          values="#ff0000;#ff7300;#fffb00;#48ff00;#00ffd5;#002bff;#7a00ff;#ff0000"
          dur="8s" repeatCount="indefinite"/>
      </stop>

      <stop offset="100%" stop-color="#002bff">
        <animate attributeName="stop-color"
          values="#002bff;#7a00ff;#ff0000;#ff7300;#fffb00;#48ff00;#00ffd5;#002bff"
          dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="#0d1117"/>

  <text
    x="50%"
    y="45%"
    text-anchor="middle"
    fill="url(#rainbow)"
    font-size="42"
    font-family="Fira Code, monospace"
    font-weight="700"
    filter="url(#glow)"
  >
    while(!success) { tryAgain(); }
  </text>

  <text
    x="50%"
    y="70%"
    text-anchor="middle"
    fill="white"
    font-size="24"
    font-family="Fira Code, monospace"
  >
    Backend Engineer | Problem Solver | IoT Engineer
  </text>

</svg>
